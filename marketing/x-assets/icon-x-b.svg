    M 80 70
    L 320 70
    L 325 92
    L 318 115
    L 326 140
    L 320 330
    L 80 325
    L 86 140
    L 78 115
    L 84 92
    Z"
    fill="#FFFFFF"/>
  <!-- binding holes -->
  <circle cx="120" cy="70" r="5" fill="#09090B"/>

  <circle cx="200" cy="70" r="5" fill="#09090B"/>
  <circle cx="240" cy="70" r="5" fill="#09090B"/>
  <circle cx="280" cy="70" r="5" fill="#09090B"/>
  <!-- m letter -->
  <text x="200" y="225"
